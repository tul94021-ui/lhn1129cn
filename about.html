<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "微软雅黑", "PingFang SC", "Noto Sans SC", "Hiragino Sans GB", Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: white;
            line-height: 1.8;
        }
        header {
            background: #111827;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
        .card {
            background: #1f2937;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .card:hover {
            background: #374151;
            transform: scale(1.02);
        }
        h1, h2 {
            margin-top: 0;
        }
        a {
            color: #60a5fa;
            text-decoration: none;
        }
        .back {
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <header>
        <h1>关于我</h1>
        <p>一个正在学习建站的人</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>⭐ 基本介绍</h2>
            <p>你好！欢迎来到我的个人博客 ✨</p>
            <p>我正在学习如何使用 HTML、CSS 和 GitHub Pages 来搭建网站。</p>
            
            <h2>🎯 兴趣爱好</h2>
            <ul>
                <li>编程 💻</li>
                <li>学习新技术 🌱</li>
                <li>做网站 🟦</li>
                <li>听音乐 🎵</li>
            </ul>
        </div>

        <!-- 返回首页链接放在卡片外面 -->
        <a href="index.html" class="back" style="color:#60a5fa;">← 返回首页</a>
    </div>
</body>
</html>
