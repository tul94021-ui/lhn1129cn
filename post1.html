<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的第一篇文章</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 
                         "Segoe UI", "Microsoft YaHei", "微软雅黑", 
                         "PingFang SC", "Noto Sans SC", 
                         "Hiragino Sans GB", Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: white;
            -webkit-font-smoothing: antialiased;
            line-height: 1.8;
        }

        header {
            background: #111827;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        .card, .post, .content {
            background: #1f2937;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card:hover, .post:hover, .content:hover {
            background: #374151;
            transform: scale(1.02);
        }

        h1, h2 {
            margin-top: 0;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        .back {
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <header>
        <h1>我的第一篇文章</h1>
        <p>这是我博客的第一篇文章内容，可以在这里写日记或者学习心得。</p>
    </header>

    <div class="container">
        <div class="card">
            <p>这里是文章详细内容，可以写很多很多。</p>
        </div>
        <a href="index.html" style="color:#60a5fa;">← 返回首页</a>
    </div>
</body>
</html>
