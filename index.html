            background-image: url('background.jpg');

<audio autoplay loop muted id="bgm">
  <source src="Always_Online.mp3" type="audio/mpeg">
</audio>

<script>

  const audio = document.getElementById("bgm");
  audio.muted = false;
  audio.play();
});
</script>
